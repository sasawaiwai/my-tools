<script>
/* ════════════════════════════════
   STAR FIELD
════════════════════════════════ */
const cv = document.getElementById('stars-canvas');
const cx = cv.getContext('2d');
let stars = [], shoots = [];

function resize() {
    cv.width  = window.innerWidth;
    cv.height = window.innerHeight;
}

function mkStars() {
    stars = [];
    const n = Math.floor(cv.width * cv.height / 2800);
    for (let i = 0; i < n; i++) stars.push({
        x: Math.random() * cv.width,
        y: Math.random() * cv.height,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random(),
        d: (Math.random() - 0.5) * 0.008,
    });
}

function draw() {
    cx.clearRect(0, 0, cv.width, cv.height);

    // Twinkle stars
    for (const s of stars) {
        s.a += s.d;
        if (s.a < 0.08 || s.a > 1) s.d *= -1;
        s.a = Math.max(0.08, Math.min(1, s.a));
        cx.beginPath();
        cx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        cx.fillStyle = `rgba(240,240,250,${s.a * 0.75})`;
        cx.fill();
    }

    // Spawn shooting star occasionally
    if (shoots.length < 2 && Math.random() < 0.004) {
        shoots.push({
            x: Math.random() * cv.width * 0.7,
            y: Math.random() * cv.height * 0.45,
            len: 90 + Math.random() * 100,
            spd: 7 + Math.random() * 7,
            a: 1,
            ang: Math.PI / 5 + (Math.random() - 0.5) * 0.3,
        });
    }

    shoots = shoots.filter(s => s.a > 0.02);
    for (const s of shoots) {
        const g = cx.createLinearGradient(
            s.x, s.y,
            s.x - Math.cos(s.ang) * s.len,
            s.y - Math.sin(s.ang) * s.len
        );
        g.addColorStop(0, `rgba(240,240,250,${s.a})`);
        g.addColorStop(1, 'rgba(240,240,250,0)');
        cx.beginPath();
        cx.moveTo(s.x, s.y);
        cx.lineTo(s.x - Math.cos(s.ang) * s.len, s.y - Math.sin(s.ang) * s.len);
        cx.strokeStyle = g;
        cx.lineWidth = 1.5;
        cx.stroke();
        s.x += Math.cos(s.ang) * s.spd;
        s.y += Math.sin(s.ang) * s.spd;
        s.a -= 0.014;
    }

    requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); mkStars(); });
resize(); mkStars(); draw();

/* ── Seeded random ── */
function hash(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i) | 0;
    return Math.abs(h);
}
const pick = (arr, k) => arr[hash(k) % arr.length];
const rInt = (min, max, k) => min + hash(k) % (max - min + 1);
const stars5 = k => { const n = rInt(1, 5, k); return '★'.repeat(n) + '☆'.repeat(5-n); };

/* ── Date keys ── */
const now = new Date();
const dStr = now.toISOString().slice(0, 10);
const mStr = dStr.slice(0, 7);
function weekKey(d) {
    const t = new Date(d); t.setDate(t.getDate() + 4 - (t.getDay() || 7));
    return `${t.getFullYear()}-W${Math.ceil(((t - new Date(t.getFullYear(),0,1)) / 86400000 + 1) / 7)}`;
}
const wStr = weekKey(now);

const DAYS = ['日','月','火','水','木','金','土'];

        number: rInt(1, 99,    bk+'-num'),

    };
}

                <div class="cat-text">${f.work.text}</div>
            </div>
            <div class="cat-item">
                <div class="cat-name">金運</div>
                <div class="cat-stars">${f.money.stars}</div>
                <div class="cat-text">${f.money.text}</div>
            </div>
            <div class="cat-item">
                <div class="cat-name">健康運</div>
                <div class="cat-stars">${f.health.stars}</div>
                <div class="cat-text">${f.health.text}</div>
            </div>
        </div>
        <div class="lucky-section">
            <div class="lucky-item">
                <div class="lucky-label">Lucky Color</div>
                <div class="lucky-value">${f.color}</div>
            </div>
            <div class="lucky-item">
                <div class="lucky-label">Lucky Number</div>
                <div class="lucky-value">${f.number}</div>
            </div>
            <div class="lucky-item">
                <div class="lucky-label">Lucky Word</div>
                <div class="lucky-value">${f.word}</div>
            </div>
        </div>`;
}

/* ════════════════════════════════
   ROUTING
════════════════════════════════ */
let curSign = 0, curPeriod = 'today';

function showDetail(idx) {
    curSign = idx; curPeriod = 'today';
    const s = SIGNS[idx];
    document.getElementById('d-symbol').textContent  = s.sym;
    document.getElementById('d-name-ja').textContent = s.ja;
    document.getElementById('d-name-en').textContent = s.en;
    document.getElementById('d-period').textContent  = s.period;

    document.querySelectorAll('.tab-btn').forEach(t =>
        t.classList.toggle('active', t.dataset.period === 'today'));

    renderFortune(idx, 'today');
    document.getElementById('view-home').style.display   = 'none';
    document.getElementById('view-detail').style.display = 'block';
    window.scrollTo(0, 0);
}

document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('view-home').style.display   = 'block';
    document.getElementById('view-detail').style.display = 'none';
    window.scrollTo(0, 0);
});

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        curPeriod = btn.dataset.period;
        document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderFortune(curSign, curPeriod);
    });
});
</script>
