<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カラピッ！ - 足りない色、ピックアップ | ブラウザ完結・無料</title>

  <meta property="og:type"        content="website">
  <meta property="og:title"       content="カラピッ！ - 足りない色、ピックアップ | ブラウザ完結・無料">
  <meta property="og:description" content="使いたい色に合う配色を自動提案。1色または2色を入力するだけで、差し色・背景色・文字色をピックアップ。ブラウザ完結・無料・インストール不要。">
  <meta property="og:url"         content="https://tools.sasadokoro.online/karapi/">
  <meta name="twitter:card"       content="summary">
  <link rel="canonical"           href="https://tools.sasadokoro.online/karapi/">
  <link rel="stylesheet" href="style.css">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZGC2WBJQTP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZGC2WBJQTP');
  </script>
  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5953104148824709" crossorigin="anonymous"></script>
</head>
<body>

  <!-- ヘッダー -->
  <header class="header">
    <div class="header__inner">
      <div class="header__icon">🎨</div>
      <div>
        <h1 class="header__title">カラピッ！</h1>
        <p class="header__desc">足りない色、ピックアップ</p>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- モード切替タブ -->
    <div class="tabs" role="tablist" aria-label="入力モード">
      <button class="tab tab--active" data-mode="one" role="tab" aria-selected="true">
        1色から提案
      </button>
      <button class="tab" data-mode="two" role="tab" aria-selected="false">
        2色から提案
      </button>
    </div>

    <!-- 入力エリア -->
    <section class="input-area card" aria-label="カラー入力">

      <!-- 1色モード -->
      <div id="input-one" class="color-inputs">
        <div class="color-input-group">
          <label class="color-label">ベースカラー</label>
          <div class="color-input-row">
            <input type="color" id="picker1" class="color-picker" value="#c8c8c8" aria-label="カラーピッカー1">
            <input type="text"  id="hex1"    class="hex-input"    value="#c8c8c8"
                   placeholder="#000000" maxlength="7" spellcheck="false">
          </div>
          <div class="rgb-sliders" data-target="1">
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--r">R</span>
              <input type="range" class="rgb-slider rgb-slider--r" data-channel="r" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="r" min="0" max="255" value="200" tabindex="1">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--g">G</span>
              <input type="range" class="rgb-slider rgb-slider--g" data-channel="g" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="g" min="0" max="255" value="200" tabindex="2">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--b">B</span>
              <input type="range" class="rgb-slider rgb-slider--b" data-channel="b" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="b" min="0" max="255" value="200" tabindex="3">
            </div>
          </div>
        </div>
      </div>

      <!-- 2色モード（初期非表示） -->
      <div id="input-two" class="color-inputs hidden">
        <div class="color-input-group">
          <label class="color-label">カラー 1</label>
          <div class="color-input-row">
            <input type="color" id="picker2" class="color-picker" value="#c8c8c8" aria-label="カラーピッカー2">
            <input type="text"  id="hex2"    class="hex-input"    value="#c8c8c8"
                   placeholder="#000000" maxlength="7" spellcheck="false">
          </div>
          <div class="rgb-sliders" data-target="2">
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--r">R</span>
              <input type="range" class="rgb-slider rgb-slider--r" data-channel="r" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="r" min="0" max="255" value="200" tabindex="10">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--g">G</span>
              <input type="range" class="rgb-slider rgb-slider--g" data-channel="g" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="g" min="0" max="255" value="200" tabindex="11">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--b">B</span>
              <input type="range" class="rgb-slider rgb-slider--b" data-channel="b" min="0" max="255" value="200" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="b" min="0" max="255" value="200" tabindex="12">
            </div>
          </div>
        </div>
        <div class="color-input-group">
          <label class="color-label">カラー 2</label>
          <div class="color-input-row">
            <input type="color" id="picker3" class="color-picker" value="#fff44f" aria-label="カラーピッカー3">
            <input type="text"  id="hex3"    class="hex-input"    value="#fff44f"
                   placeholder="#000000" maxlength="7" spellcheck="false">
          </div>
          <div class="rgb-sliders" data-target="3">
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--r">R</span>
              <input type="range" class="rgb-slider rgb-slider--r" data-channel="r" min="0" max="255" value="255" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="r" min="0" max="255" value="255" tabindex="20">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--g">G</span>
              <input type="range" class="rgb-slider rgb-slider--g" data-channel="g" min="0" max="255" value="244" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="g" min="0" max="255" value="244" tabindex="21">
            </div>
            <div class="rgb-slider-row">
              <span class="rgb-slider-label rgb-slider-label--b">B</span>
              <input type="range" class="rgb-slider rgb-slider--b" data-channel="b" min="0" max="255" value="79" tabindex="-1">
              <input type="number" class="rgb-slider-value" data-channel-value="b" min="0" max="255" value="79" tabindex="22">
            </div>
          </div>
        </div>
      </div>

      <!-- エラーメッセージ -->
      <div id="error-msg" class="error-msg hidden" role="alert" aria-live="polite"></div>

      <!-- 生成ボタン -->
      <button id="generate-btn" class="generate-btn" type="button">
        配色を提案する
      </button>

    </section>

    <!-- 提案結果エリア -->
    <section id="results-area" class="results-area hidden" aria-label="提案カラー">
      <h2 class="section-title">提案カラー</h2>
      <div id="suggestions" class="suggestions"></div>
    </section>

    <!-- プレビューエリア -->
    <section id="preview-area" class="preview-area hidden" aria-label="配色プレビュー">
      <h2 class="section-title">配色プレビュー</h2>
      <p class="section-hint">↻ ボタンで背景・文字・ボタンの割り当てを切り替えられます</p>
      <div id="previews" class="previews"></div>
    </section>

  </main>

  </footer>

  <script src="script.js"></script>
</body>
</html>
