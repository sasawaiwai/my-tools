<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZENfinger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; touch-action: none; }
    canvas { display: block; width: 100vw; height: 100dvh; touch-action: none; }

    #title {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px; letter-spacing: 0.18em; color: #b5b2ac;
      pointer-events: none; user-select: none;
    }

    #clear-btn {
      position: fixed; bottom: 20px; right: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px; letter-spacing: 0.1em; color: #aaa;
      background: rgba(255,255,255,0.65); border: 1px solid #ccc;
      border-radius: 20px; padding: 8px 18px; cursor: pointer;
      user-select: none; backdrop-filter: blur(4px);
      transition: color 0.2s, border-color 0.2s;
    }
    #clear-btn:active { color: #666; border-color: #999; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="title">ZENfinger</div>
  <button id="clear-btn">Clear</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    // ── Parameters ───────────────────────────────────────────────
    const BG         = '#f5f2ec';
    const LINE_COLOR = 'rgba(48, 44, 36, 0.40)';
    const LINE_W     = 0.78;
    const CELL       = 7;     // px per grid cell (also line length)
    const GROOM_R    = 38;    // grooming radius in px
    const GROOM_STR  = 0.22;  // lerp strength at center of brush
    const STAMP_DIST = 5;     // px between groom stamps
    const DIR_SMOOTH = 0.30;  // direction smoothing (lower = more lag)
    // ─────────────────────────────────────────────────────────────

    let cols = 0, rows = 0;
    let field; // Float32Array — undirected angle [0, π) per cell

    // Interaction state
    let active   = false;
    let prevX    = 0, prevY = 0, distAcc = 0;
    let groomDir = 0; // smoothed groom direction (undirected, 0…π)

    // Dirty region (in cell coords) for incremental re-render
    let dirty = false;
    let dC0 = 0, dR0 = 0, dC1 = 0, dR1 = 0;

    // ── Orientation field ────────────────────────────────────────

    // Smooth sinusoidal "pre-disturbed" state — not empty, not chaotic
    function buildField() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          // Multi-frequency smooth variation (~±50° from horizontal)
          const v = Math.sin(c * 0.16 + r * 0.09) * 0.44
                  + Math.sin(c * 0.06 - r * 0.13) * 0.27
                  + Math.cos(c * 0.11 + r * 0.20) * 0.17;
          // Base: horizontal (0). Normalize to [0, π).
          field[r * cols + c] = ((v % Math.PI) + Math.PI) % Math.PI;
        }
      }
    }

    // ── Rendering ────────────────────────────────────────────────

    function drawCell(c, r) {
      const a  = field[r * cols + c];
      const cx = c * CELL + CELL * 0.5;
      const cy = r * CELL + CELL * 0.5;
      const hl = CELL * 0.50;
      ctx.beginPath();
      ctx.moveTo(cx - Math.cos(a) * hl, cy - Math.sin(a) * hl);
      ctx.lineTo(cx + Math.cos(a) * hl, cy + Math.sin(a) * hl);
      ctx.stroke();
    }

    function renderRegion(c0, r0, c1, r1) {
      ctx.fillStyle = BG;
      ctx.fillRect(c0 * CELL, r0 * CELL, (c1 - c0 + 1) * CELL, (r1 - r0 + 1) * CELL);
      ctx.strokeStyle = LINE_COLOR;
      ctx.lineWidth   = LINE_W;
      ctx.lineCap     = 'round';
      for (let r = r0; r <= r1; r++) {
        for (let c = c0; c <= c1; c++) drawCell(c, r);
      }
    }

    function renderFull() {
      renderRegion(0, 0, cols - 1, rows - 1);
    }

    // Flush dirty region once per RAF
    function flushDirty() {
      if (!dirty) return;
      const pad = 1;
      renderRegion(
        Math.max(0,        dC0 - pad),
        Math.max(0,        dR0 - pad),
        Math.min(cols - 1, dC1 + pad),
        Math.min(rows - 1, dR1 + pad)
      );
      dirty = false;
    }

    function markDirty(c0, r0, c1, r1) {
      if (!dirty) { dC0 = c0; dR0 = r0; dC1 = c1; dR1 = r1; dirty = true; }
      else {
        if (c0 < dC0) dC0 = c0;
        if (r0 < dR0) dR0 = r0;
        if (c1 > dC1) dC1 = c1;
        if (r1 > dR1) dR1 = r1;
      }
    }

    // ── Grooming ─────────────────────────────────────────────────

    // Shortest-path lerp for undirected angles (mod π)
    function lerpAngle(a, b, t) {
      let d = b - a;
      if (d >  Math.PI * 0.5) d -= Math.PI;
      if (d < -Math.PI * 0.5) d += Math.PI;
      return ((a + d * t) % Math.PI + Math.PI) % Math.PI;
    }

    function groomStamp(fx, fy, angle) {
      const cr = Math.ceil(GROOM_R / CELL);
      const fc = fx / CELL;
      const fr = fy / CELL;
      const R2 = GROOM_R * GROOM_R;
      // Gaussian exponent: exp(-d²·k), at r=GROOM_R the influence ≈ 0.05
      const k  = 3.0 / R2;

      let c0 = cols, r0 = rows, c1 = -1, r1 = -1;

      for (let dr = -cr; dr <= cr; dr++) {
        for (let dc = -cr; dc <= cr; dc++) {
          const c = Math.round(fc) + dc;
          const r = Math.round(fr) + dr;
          if (c < 0 || c >= cols || r < 0 || r >= rows) continue;

          const cx = c * CELL + CELL * 0.5;
          const cy = r * CELL + CELL * 0.5;
          const d2 = (cx - fx) ** 2 + (cy - fy) ** 2;
          if (d2 > R2) continue;

          const infl = Math.exp(-d2 * k);
          const idx  = r * cols + c;
          field[idx] = lerpAngle(field[idx], angle, GROOM_STR * infl);

          if (c < c0) c0 = c;
          if (r < r0) r0 = r;
          if (c > c1) c1 = c;
          if (r > r1) r1 = r;
        }
      }
      if (c1 >= 0) markDirty(c0, r0, c1, r1);
    }

    // ── Input handling ───────────────────────────────────────────

    function onMove(x, y) {
      const dx   = x - prevX;
      const dy   = y - prevY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.5) return;

      // Undirected angle from movement (atan2 mod π)
      const raw = ((Math.atan2(dy, dx) % Math.PI) + Math.PI) % Math.PI;

      // Smooth direction — handle wraparound at 0/π
      let diff = raw - groomDir;
      if (diff >  Math.PI * 0.5) diff -= Math.PI;
      if (diff < -Math.PI * 0.5) diff += Math.PI;
      groomDir = ((groomDir + diff * DIR_SMOOTH) % Math.PI + Math.PI) % Math.PI;

      distAcc += dist;

      // Interpolate stamp positions so fast swipes never skip
      while (distAcc >= STAMP_DIST) {
        const t  = 1 - (distAcc - STAMP_DIST) / dist;
        groomStamp(prevX + dx * t, prevY + dy * t, groomDir);
        distAcc -= STAMP_DIST;
      }

      prevX = x; prevY = y;
    }

    function onStart(x, y) {
      active = true; prevX = x; prevY = y; distAcc = 0;
    }

    function onEnd() { active = false; }

    // Mouse
    canvas.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
    canvas.addEventListener('mousemove',  e => { if (active) onMove(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup',    onEnd);
    canvas.addEventListener('mouseleave', onEnd);

    // Touch
    canvas.addEventListener('touchstart', e => {
      e.preventDefault(); onStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault(); if (active) onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchend',    e => { e.preventDefault(); onEnd(); }, { passive: false });
    canvas.addEventListener('touchcancel', e => { e.preventDefault(); onEnd(); }, { passive: false });

    // Clear — reset to disturbed state (not blank)
    document.getElementById('clear-btn').addEventListener('click', () => {
      buildField(); renderFull(); dirty = false;
    });

    // ── Bootstrap ────────────────────────────────────────────────

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      cols  = Math.ceil(window.innerWidth  / CELL) + 1;
      rows  = Math.ceil(window.innerHeight / CELL) + 1;
      field = new Float32Array(cols * rows);
      buildField();
      renderFull();
      dirty = false;
    }

    function loop() { flushDirty(); requestAnimationFrame(loop); }

    resize();
    window.addEventListener('resize', resize);
    requestAnimationFrame(loop);
  </script>
</body>
</html>
