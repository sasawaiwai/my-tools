<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZENfinger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #f5f2ec;
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100dvh;
      touch-action: none;
    }

    #title {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      letter-spacing: 0.18em;
      color: #aaa9a3;
      pointer-events: none;
      user-select: none;
    }

    #clear-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #aaa;
      background: rgba(255,255,255,0.7);
      border: 1px solid #ccc;
      border-radius: 20px;
      padding: 8px 18px;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(4px);
      transition: color 0.2s, border-color 0.2s;
    }

    #clear-btn:active { color: #666; border-color: #999; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="title">ZENfinger</div>
  <button id="clear-btn">Clear</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    // ── Rake parameters ──────────────────────────────────────────
    const BG           = '#f5f2ec';
    const TINE_COUNT   = 7;       // number of grooves per stamp
    const TINE_SPACING = 8;       // px between grooves (perpendicular to motion)
    const TOOTH_HALF   = 14;      // half-length of each groove (along motion)
    const STAMP_DIST   = 5;       // px between consecutive stamps
    const LINE_W       = 1.0;
    const LINE_ALPHA   = 0.60;
    const WOBBLE_AMP   = 1.1;     // max px wobble on groove endpoints
    const DIR_SMOOTH   = 0.30;    // direction lerp factor (lower = smoother turn)

    // Width of the "re-settle" erase rectangle around each stamp
    const ERASE_ALPHA  = 0.42;    // how aggressively to overwrite old marks
    // ─────────────────────────────────────────────────────────────

    let drawing  = false;
    let prevX = 0, prevY = 0;
    let distAcc  = 0;             // accumulated distance since last stamp
    let smoothUx = 1, smoothUy = 0; // smoothed unit direction vector

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    }

    // Stamp the rake at (cx, cy) heading in unit direction (ux, uy)
    function stampRake(cx, cy, ux, uy) {
      // Normal vector — perpendicular to motion, spans rake width
      const nx = -uy;
      const ny =  ux;

      const halfRake = (TINE_COUNT - 1) / 2 * TINE_SPACING;
      const eraseW   = (TOOTH_HALF + 3) * 2;
      const eraseH   = (halfRake  + TINE_SPACING * 0.6) * 2;

      // Re-settle sand: draw rotated semi-transparent BG rect over the stamp area.
      // This fades old conflicting marks so the new direction reads cleanly.
      ctx.save();
      ctx.globalAlpha = ERASE_ALPHA;
      ctx.fillStyle   = BG;
      ctx.translate(cx, cy);
      ctx.rotate(Math.atan2(uy, ux));
      ctx.fillRect(-eraseW / 2, -eraseH / 2, eraseW, eraseH);
      ctx.restore();

      // Draw each groove line
      ctx.save();
      ctx.strokeStyle = `rgba(42, 38, 30, ${LINE_ALPHA})`;
      ctx.lineWidth   = LINE_W;
      ctx.lineCap     = 'round';

      for (let i = 0; i < TINE_COUNT; i++) {
        const t  = i - (TINE_COUNT - 1) / 2;   // e.g. -3…+3 for 7 tines
        const bx = cx + nx * t * TINE_SPACING;
        const by = cy + ny * t * TINE_SPACING;

        // Position-based wobble: consistent per tine, unique per location
        const phase = (cx + cy) * 0.04 + i * 1.7;
        const w1 = Math.sin(phase)        * WOBBLE_AMP;
        const w2 = Math.sin(phase + 0.9)  * WOBBLE_AMP;

        ctx.beginPath();
        ctx.moveTo(bx - ux * TOOTH_HALF + nx * w1,
                   by - uy * TOOTH_HALF + ny * w1);
        ctx.lineTo(bx + ux * TOOTH_HALF + nx * w2,
                   by + uy * TOOTH_HALF + ny * w2);
        ctx.stroke();
      }

      ctx.restore();
    }

    // Interpolate stamps between prevX/Y and current x/y so fast swipes
    // never skip stamps entirely
    function handleMove(x, y) {
      const dx   = x - prevX;
      const dy   = y - prevY;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 0.5) return;

      // Smooth the heading direction
      const rawUx = dx / dist;
      const rawUy = dy / dist;
      smoothUx = smoothUx + (rawUx - smoothUx) * DIR_SMOOTH;
      smoothUy = smoothUy + (rawUy - smoothUy) * DIR_SMOOTH;
      const sLen = Math.sqrt(smoothUx * smoothUx + smoothUy * smoothUy);
      const ux = smoothUx / sLen;
      const uy = smoothUy / sLen;

      distAcc += dist;

      // Stamp at fixed intervals; interpolate position along segment
      while (distAcc >= STAMP_DIST) {
        const ratio = 1 - (distAcc - STAMP_DIST) / dist;
        const sx = prevX + dx * ratio;
        const sy = prevY + dy * ratio;
        stampRake(sx, sy, ux, uy);
        distAcc -= STAMP_DIST;
      }

      prevX = x;
      prevY = y;
    }

    function startDraw(x, y) {
      drawing = true;
      prevX   = x;
      prevY   = y;
      distAcc = 0;
    }

    // ── Mouse ────────────────────────────────────────────────────
    canvas.addEventListener('mousedown',  e => startDraw(e.clientX, e.clientY));
    canvas.addEventListener('mousemove',  e => { if (drawing) handleMove(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup',    () => { drawing = false; });
    canvas.addEventListener('mouseleave', () => { drawing = false; });

    // ── Touch ────────────────────────────────────────────────────
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      startDraw(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      if (drawing) handleMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });

    canvas.addEventListener('touchend',    e => { e.preventDefault(); drawing = false; }, { passive: false });
    canvas.addEventListener('touchcancel', e => { e.preventDefault(); drawing = false; }, { passive: false });

    // ── Clear ────────────────────────────────────────────────────
    document.getElementById('clear-btn').addEventListener('click', () => {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
    });

    // ── Init ─────────────────────────────────────────────────────
    resize();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
