<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ZENfinger</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100dvh; overflow: hidden; touch-action: none; background: #f0ede6; }
    canvas { display: block; width: 100vw; height: 100dvh; touch-action: none; }

    #title {
      position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px; letter-spacing: 0.18em; color: #c2bfb9;
      pointer-events: none; user-select: none;
    }

    #clear-btn {
      position: fixed; bottom: 20px; right: 20px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px; letter-spacing: 0.1em; color: #bbb;
      background: rgba(255,255,255,0.60); border: 1px solid #ccc;
      border-radius: 20px; padding: 8px 18px; cursor: pointer;
      user-select: none; backdrop-filter: blur(4px);
      transition: color 0.2s, border-color 0.2s;
    }
    #clear-btn:active { color: #666; border-color: #999; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="title">ZENfinger</div>
  <button id="clear-btn">Clear</button>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    // ── Visual ───────────────────────────────────────────────────
    const BG           = '#f0ede6';

    // Each groove = shadow line (carved trough) + ridge highlight (raised edge)
    const GROOVE_COLOR = 'rgba(28, 24, 16, 0.54)';
    const GROOVE_W     = 1.2;
    const RIDGE_COLOR  = 'rgba(255, 252, 244, 0.64)';
    const RIDGE_W      = 0.8;
    const RIDGE_OFF    = -1.6; // px offset in tine-normal direction (simulated light from left)

    // Before each stamp, faint BG fill "re-settles" old grooves beneath new ones
    const SETTLE_A     = 0.50;

    // ── Rake ─────────────────────────────────────────────────────
    const TINES        = 7;
    const SP_SLOW      = 7;   // px between tines at low speed
    const SP_FAST      = 15;  // px between tines at high speed
    const TINE_HL      = 16;  // half-length of each tine segment (along motion)
    const STAMP_DIST   = 7;   // px between stamps

    // ── Speed / direction ────────────────────────────────────────
    const SPEED_LO     = 0.12; // px/ms
    const SPEED_HI     = 1.80; // px/ms
    const SP_LERP      = 0.22; // spacing smoothing
    const DIR_LERP     = 0.28; // direction smoothing
    // ─────────────────────────────────────────────────────────────

    let active      = false;
    let prevX = 0,  prevY = 0, prevTime = 0, distAcc = 0;
    let smoothUx    = 1, smoothUy = 0;
    let tineSpacing = SP_SLOW;

    // ── Canvas ───────────────────────────────────────────────────

    function resize() {
      const dpr = window.devicePixelRatio || 1;
      canvas.width  = window.innerWidth  * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
      fill();
    }

    function fill() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      // Sand grain: pixel noise on BG. Precomputed table + prime step = no visible tiling.
      const N  = 2048;
      const ns = new Int8Array(N);
      for (let k = 0; k < N; k++) ns[k] = ((Math.random() * 28) | 0) - 14;

      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d   = img.data;
      for (let pi = 0, i = 0; i < d.length; i += 4, pi++) {
        const n = ns[(pi * 1597) & 2047];
        d[i]   = d[i]   + n < 0 ? 0 : d[i]   + n > 255 ? 255 : d[i]   + n;
        d[i+1] = d[i+1] + n < 0 ? 0 : d[i+1] + n > 255 ? 255 : d[i+1] + n;
        d[i+2] = d[i+2] + n < 0 ? 0 : d[i+2] + n > 255 ? 255 : d[i+2] + n;
      }
      ctx.putImageData(img, 0, 0);
    }

    // ── Rake stamp ───────────────────────────────────────────────

    // (cx, cy) = stamp center, (ux, uy) = unit motion direction, sp = tine spacing
    function stampRake(cx, cy, ux, uy, sp) {
      const nx       = -uy;   // unit normal (perpendicular to motion)
      const ny       =  ux;
      const halfRake = (TINES - 1) / 2 * sp;

      // Re-settle: fade previous marks under the stamp area
      ctx.save();
      ctx.globalAlpha = SETTLE_A;
      ctx.fillStyle   = BG;
      ctx.translate(cx, cy);
      ctx.rotate(Math.atan2(uy, ux));
      ctx.fillRect(
        -(TINE_HL + 2),           -(halfRake + sp * 0.65),
         (TINE_HL + 2) * 2,        (halfRake + sp * 0.65) * 2
      );
      ctx.restore();

      ctx.lineCap = 'round';

      for (let i = 0; i < TINES; i++) {
        const t  = i - (TINES - 1) / 2;  // −3 … +3
        const bx = cx + nx * t * sp;
        const by = cy + ny * t * sp;

        const x0 = bx - ux * TINE_HL,  y0 = by - uy * TINE_HL;
        const x1 = bx + ux * TINE_HL,  y1 = by + uy * TINE_HL;

        // Shadow — the groove itself
        ctx.strokeStyle = GROOVE_COLOR;
        ctx.lineWidth   = GROOVE_W;
        ctx.beginPath();
        ctx.moveTo(x0, y0);
        ctx.lineTo(x1, y1);
        ctx.stroke();

        // Highlight — raised ridge on one side of the groove
        ctx.strokeStyle = RIDGE_COLOR;
        ctx.lineWidth   = RIDGE_W;
        ctx.beginPath();
        ctx.moveTo(x0 + nx * RIDGE_OFF, y0 + ny * RIDGE_OFF);
        ctx.lineTo(x1 + nx * RIDGE_OFF, y1 + ny * RIDGE_OFF);
        ctx.stroke();
      }
    }

    // ── Input ────────────────────────────────────────────────────

    function onMove(x, y) {
      const now  = performance.now();
      const dt   = Math.min(now - prevTime, 80);
      prevTime   = now;

      const dx   = x - prevX;
      const dy   = y - prevY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 0.5) return;

      // Speed → tine spacing
      const speed    = dt > 2 ? dist / dt : SPEED_HI;
      const st       = Math.min(1, Math.max(0, (speed - SPEED_LO) / (SPEED_HI - SPEED_LO)));
      const targetSp = SP_SLOW + (SP_FAST - SP_SLOW) * st;
      tineSpacing   += (targetSp - tineSpacing) * SP_LERP;

      // Direction smoothing
      smoothUx += (dx / dist - smoothUx) * DIR_LERP;
      smoothUy += (dy / dist - smoothUy) * DIR_LERP;
      const sLen = Math.sqrt(smoothUx * smoothUx + smoothUy * smoothUy);
      const ux = smoothUx / sLen,  uy = smoothUy / sLen;

      // Place stamps at fixed intervals, interpolated along the segment
      distAcc += dist;
      while (distAcc >= STAMP_DIST) {
        const s  = 1 - (distAcc - STAMP_DIST) / dist;
        stampRake(prevX + dx * s, prevY + dy * s, ux, uy, tineSpacing);
        distAcc -= STAMP_DIST;
      }

      prevX = x;  prevY = y;
    }

    function onStart(x, y) {
      active   = true;
      prevX    = x;  prevY = y;
      distAcc  = 0;  prevTime = performance.now();
    }

    function onEnd() { active = false; }

    // Mouse
    canvas.addEventListener('mousedown',  e => onStart(e.clientX, e.clientY));
    canvas.addEventListener('mousemove',  e => { if (active) onMove(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup',    onEnd);
    canvas.addEventListener('mouseleave', onEnd);

    // Touch
    canvas.addEventListener('touchstart', e => {
      e.preventDefault();  onStart(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();  if (active) onMove(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: false });
    canvas.addEventListener('touchend',    e => { e.preventDefault(); onEnd(); }, { passive: false });
    canvas.addEventListener('touchcancel', e => { e.preventDefault(); onEnd(); }, { passive: false });

    document.getElementById('clear-btn').addEventListener('click', fill);

    // ── Init ─────────────────────────────────────────────────────
    resize();
    window.addEventListener('resize', resize);
  </script>
</body>
</html>
