  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f2f0ed;
      --surface:     #ffffff;
      --border:      #e3e0db;
      --border2:     #d0ccc6;
      --text:        #252220;
      --text-muted:  #8c8680;
      --accent:      #607060;

    body {

      background: var(--bg);

      min-height: 100vh;

    .container {

      flex-direction: column;

    }

    /* ── ロゴ ── */
    .logo {
      text-align: center;
    }
    .logo-eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .logo-name {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text);
    }
    .logo-divider {
      width: 32px;
      height: 1px;
      background: var(--border2);
      margin: 16px auto 0;
    }

    /* ── リンクカード ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .link-card:hover {
      border-color: var(--accent);
      background: var(--accent-pale);
      transform: translateY(-1px);
    }

    .link-icon {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      background: var(--accent-pale);
      border: 1px solid #c8d4c8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .link-info {
      flex: 1;
    }
    .link-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      margin-bottom: 2px;
    }
    .link-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .link-arrow {
      font-size: 14px;
      color: var(--border2);
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .link-card:hover .link-arrow {
      color: var(--accent);
    }

    /* ── フッター ── */
    footer {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
    }
