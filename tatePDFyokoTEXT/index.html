<style>
  :root {
    --bg:       #f5f3ef;
    --surface:  #ffffff;
    --border:   #dedad3;
    --accent:   #b8862a;
    --accent2:  #5f7a42;

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;

  /* ── ヘッダー ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .logo span { color: var(--text); }
  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-left: 1px solid var(--border);

  .privacy-badge {

    color: var(--accent2);
    border: 1px solid var(--accent2);
    padding: 4px 10px;
    letter-spacing: 0.06em;

  /* ── メイン ── */

    flex: 1;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    padding: 48px 32px;
  }

  /* ── ドロップゾーン ── */
  .drop-zone {
    border: 1.5px dashed var(--border);
    padding: 64px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 20px,
      rgba(0,0,0,.018) 20px,
      rgba(0,0,0,.018) 21px
    );
  }
  .drop-zone:hover,
  .drop-zone.over {
    border-color: var(--accent);
    background: rgba(212,168,67,.04);
  }
  .drop-icon {
    font-size: 40px;
    margin-bottom: 16px;
    opacity: .6;
  }
  .drop-title {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .drop-sub {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.7;
  }
  .drop-sub strong { color: var(--accent2); }
  #file-input { display: none; }

  /* ── ファイル情報 ── */
  .file-info {
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .file-info.hidden { display: none; }
  .file-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-meta {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    white-space: nowrap;
  }
  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color .15s;
  }
  .clear-btn:hover { color: var(--danger); }

  /* ── アクションボタン ── */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    align-items: center;
  }
  .extract-btn {
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    padding: 10px 28px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity .15s, transform .1s;
  }
  .extract-btn:hover { opacity: .85; }
  .extract-btn:active { transform: scale(.98); }
  .extract-btn:disabled { opacity: .35; cursor: not-allowed; }

  .copy-btn {
    background: none;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    padding: 10px 20px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all .15s;
  }
  .copy-btn:hover { background: rgba(95,122,66,.1); }
  .copy-btn:disabled { opacity: .35; cursor: not-allowed; }

  /* ── ステータス ── */
  .status-wrap {
    display: none;
    margin-top: 24px;
  }
  .status-wrap.show { display: block; }
  .status-bar {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 10px 14px;
    border-left: 3px solid var(--border);
    color: var(--muted);
  }
  .status-bar.info    { border-color: var(--accent);  color: var(--text); }
  .status-bar.success { border-color: var(--accent2); color: var(--accent2); }
  .status-bar.error   { border-color: var(--danger);  color: var(--danger); }

  /* ── 結果エリア ── */
  .result-section {
    display: none;
    margin-top: 40px;
  }
  .result-section.show { display: block; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .section-title {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;

  .count-badge {

  textarea {

  /* ── フッター ── */

<body>

<header>
  <div class="logo">縦書きPDF<span>→横書きTEXT</span></div>
  <div class="tagline">縦書きレイアウトのテキストを抽出</div>
  <div class="privacy-badge">NO UPLOAD · LOCAL ONLY</div>
</header>

<main>

  <!-- ドロップゾーン -->
  <div class="drop-zone" id="drop-zone">
    <input type="file" id="file-input" accept=".pdf">
    <div class="drop-icon">📄</div>
    <div class="drop-title">PDFをここにドロップ</div>
    <div class="drop-sub">
      またはクリックしてファイルを選択<br>
      <strong>ファイルはサーバーに送信されません。すべてブラウザ内で処理します。</strong><br>
      ※テキスト情報を持つPDFのみ対応。スキャン画像のみのPDFには未対応です。
    </div>
  </div>

  <!-- ファイル情報 -->
  <div class="file-info hidden" id="file-info">
    <div class="file-name" id="file-name-text">—</div>
    <div class="file-meta" id="file-meta-text">—</div>
    <button class="clear-btn" id="clear-btn" title="クリア">✕</button>
  </div>

  <!-- アクションボタン -->
  <div class="actions">
    <button class="extract-btn" id="extract-btn" disabled>テキスト抽出</button>
    <button class="copy-btn" id="copy-btn" disabled>結果をコピー</button>
  </div>

  <!-- ステータス -->
  <div class="status-wrap" id="status-wrap">
    <div class="status-bar" id="status-bar"></div>
  </div>

  <!-- 結果 -->
  <div class="result-section" id="result-section">
    <div class="section-header">
      <div class="section-title">抽出結果</div>
      <div class="count-badge" id="count-badge">0 pages</div>
    </div>
    <textarea id="result" placeholder="抽出されたテキストがここに表示されます…" readonly></textarea>
  </div>

</main>

<footer>
  <div class="footer-note">アップロード不要・サーバー処理なし・PDFはブラウザ内だけで処理されます</div>

</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const fileInfo    = document.getElementById('file-info');
  const fileNameText = document.getElementById('file-name-text');
  const fileMetaText = document.getElementById('file-meta-text');
  const clearBtn    = document.getElementById('clear-btn');
  const extractBtn  = document.getElementById('extract-btn');
  const copyBtn     = document.getElementById('copy-btn');
  const statusWrap  = document.getElementById('status-wrap');
  const statusBar   = document.getElementById('status-bar');
  const resultSec   = document.getElementById('result-section');
  const countBadge  = document.getElementById('count-badge');
  const resultArea  = document.getElementById('result');

  let selectedFile = null;

  // ── ドロップ&ファイル選択 ──
  dropZone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) setFile(fileInput.files[0]);
  });
  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') setFile(f);
  });

  function setFile(file) {
    selectedFile = file;
    fileNameText.textContent = file.name;
    fileMetaText.textContent = formatSize(file.size);
    fileInfo.classList.remove('hidden');
    extractBtn.disabled = false;
    copyBtn.disabled = true;
    statusWrap.classList.remove('show');
    resultSec.classList.remove('show');
    resultArea.value = '';
  }

  clearBtn.addEventListener('click', () => {
    selectedFile = null;
    fileInput.value = '';
    fileInfo.classList.add('hidden');
    extractBtn.disabled = true;
    copyBtn.disabled = true;
    statusWrap.classList.remove('show');
    resultSec.classList.remove('show');
    resultArea.value = '';
  });

  // ── テキスト抽出 ──
  extractBtn.addEventListener('click', async () => {
    if (!selectedFile) return;
    await extractText();
  });

  async function extractText() {
    resultArea.value = '';
    copyBtn.disabled = true;
    extractBtn.disabled = true;
    showStatus('処理中...', 'info');
    statusWrap.classList.add('show');

    try {
      const arrayBuffer = await selectedFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const numPages = pdf.numPages;
      countBadge.textContent = `${numPages} pages`;

      let allText = '';

      for (let pageNum = 1; pageNum <= numPages; pageNum++) {
        showStatus(`処理中… (${pageNum} / ${numPages})`, 'info');
        const page = await pdf.getPage(pageNum);
        const textContent = await page.getTextContent();
        const sortedText = extractVerticalText(textContent.items);
        allText += `===== Page ${pageNum} =====\n`;
        allText += sortedText + '\n\n';
      }

      resultArea.value = allText.trim();
      resultSec.classList.add('show');
      copyBtn.disabled = false;
      showStatus(`✓ 抽出完了 (全${numPages}ページ)`, 'success');

    } catch (error) {
      console.error('PDF処理エラー:', error);
      const msg = error?.message?.toLowerCase().includes('password')
        ? 'パスワード付きPDFは対応していません'
        : `エラーが発生しました: ${error.message}`;
      showStatus(msg, 'error');
    } finally {
      extractBtn.disabled = false;
    }
  }

  // ── コピー ──
  copyBtn.addEventListener('click', async () => {
    try {
      await navigator.clipboard.writeText(resultArea.value);
      showStatus('✓ クリップボードにコピーしました', 'success');
    } catch (e) {
      resultArea.select();
      document.execCommand('copy');
      showStatus('✓ クリップボードにコピーしました', 'success');
    }
  });

  // ── 縦書きテキスト抽出 ──
  function extractVerticalText(items) {
    const itemsWithCoords = items.map(item => ({
      str: item.str,
      x: item.transform[4],
      y: item.transform[5]
    }));

    itemsWithCoords.sort((a, b) => {
      const xDiff = b.x - a.x;
      if (Math.abs(xDiff) < 5) return b.y - a.y;
      return xDiff;
    });

    const rawText = itemsWithCoords.map(item => item.str).join('');
    return normalizeVerticalPunctuation(rawText);
  }

  function normalizeVerticalPunctuation(text) {
    return text
      .replace(/︒/g, '。')
      .replace(/︑/g, '、')
      .replace(/﹁/g, '「')
      .replace(/﹂/g, '」');
  }

  // ── ユーティリティ ──
  function showStatus(message, type) {
    statusBar.textContent = message;
    statusBar.className = 'status-bar ' + type;
  }

  function formatSize(bytes) {
    if (bytes < 1024)     return bytes + ' B';
    if (bytes < 1024**2)  return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024**2).toFixed(1) + ' MB';
  }
</script>
</body>
