<script>
'use strict';

// ── 状態 ──────────────────────────────────────────────────
const state = {
  shape: 'heart',
  color: '#ff6b9d',
  outlineEnabled: false,
  outlineColor: '#ffffff',
  outlineWidth: 2,
  tintEnabled: false,
  pattern: 'fade',
  interval: 800,
  frameCount: 12,
  minOpacity: 0,
  count: 1,
  layout: 'grid',
  shapeSize: 60,
  outputSize: 128,
  loop: true,
};

let randomSeeds = generateSeeds(9);
let animRaf = null;
let animStartTime = null;
let customImage = null;
let tintCache = null;

// ── ランダム位置（シード固定） ────────────────────────────
function generateSeeds(n) {
  const seeds = [];
  const rng = mulberry32(0xdeadbeef);
  for (let i = 0; i < n; i++) seeds.push({ rx: rng(), ry: rng() });
  return seeds;
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ── 図形の位置計算 ─────────────────────────────────────────
function getPositions(count, layout, canvasSize, shapeRadius) {
  const positions = [];
  const margin = shapeRadius;
  if (layout === 'grid') {
    const cols = Math.ceil(Math.sqrt(count));
    const rows = Math.ceil(count / cols);
    const cellW = canvasSize / cols;
    const cellH = canvasSize / rows;
    for (let i = 0; i < count; i++) {
      positions.push({
        x: cellW * (i % cols + 0.5),
        y: cellH * (Math.floor(i / cols) + 0.5),
        phase: i / count,
      });
    }
  } else if (layout === 'random') {
    const usable = canvasSize - shapeRadius * 2;
    for (let i = 0; i < count; i++) {
      const s = randomSeeds[i] || { rx: 0.5, ry: 0.5 };
      positions.push({
        x: margin + s.rx * usable,
        y: margin + s.ry * usable,
        phase: i / count,
      });
    }
  } else {
    const cx = canvasSize / 2;
    const cy = canvasSize / 2;
    const r = count === 1 ? 0 : (canvasSize / 2 - shapeRadius * 1.1);
    for (let i = 0; i < count; i++) {
      const angle = (i / count) * Math.PI * 2 - Math.PI / 2;
      positions.push({
        x: cx + r * Math.cos(angle),
        y: cy + r * Math.sin(angle),
        phase: i / count,
      });
    }
  }
  return positions;
}

// ── 透明度計算 ─────────────────────────────────────────────
function getOpacity(globalT, phase, pattern, minOpacity) {
  let t = (globalT + phase) % 1;
  const minA = minOpacity / 100;
  if (pattern === 'snap') return t < 0.5 ? 1.0 : minA;
  if (t < 0.5) {
    const p = t / 0.5;
    return 1.0 - (1.0 - minA) * (0.5 - 0.5 * Math.cos(p * Math.PI));
  } else {
    const p = (t - 0.5) / 0.5;
    return minA + (1.0 - minA) * (0.5 - 0.5 * Math.cos(p * Math.PI));
  }
}

// ── 図形描画 ───────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha.toFixed(3)})`;
}

function buildPath(ctx, shape, cx, cy, size) {
  const r = size / 2;
  ctx.beginPath();
  switch (shape) {
    case 'heart': {
      const sc = r / 16;
      const steps = 120;
      for (let i = 0; i <= steps; i++) {
        const t = (i / steps) * Math.PI * 2;
        const x = cx + sc * 16 * Math.pow(Math.sin(t), 3);
        const y = cy - sc * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      break;
    }
    case 'star': {
      const outerR = r;
      const innerR = r * 0.38;
      const pts = 5;
      for (let i = 0; i < pts * 2; i++) {
        const rad = i % 2 === 0 ? outerR : innerR;
        const angle = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
        const x = cx + rad * Math.cos(angle);
        const y = cy + rad * Math.sin(angle);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      break;
    }
    case 'circle': ctx.arc(cx, cy, r, 0, Math.PI * 2); break;
    case 'diamond':
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx + r * 0.65, cy);
      ctx.lineTo(cx, cy + r);
      ctx.lineTo(cx - r * 0.65, cy);
      ctx.closePath();
      break;
    case 'lightning':
      ctx.moveTo(cx + r * 0.28, cy - r);
      ctx.lineTo(cx - r * 0.08, cy - r * 0.08);
      ctx.lineTo(cx + r * 0.28, cy - r * 0.08);
      ctx.lineTo(cx - r * 0.28, cy + r);
      ctx.lineTo(cx + r * 0.08, cy + r * 0.08);
      ctx.lineTo(cx - r * 0.28, cy + r * 0.08);
      ctx.closePath();
      break;
    default: break;
  }
}

function getTintedCanvas(img, color) {
  if (tintCache && tintCache.img === img && tintCache.color === color) return tintCache.canvas;
  const c = document.createElement('canvas');
  c.width = img.naturalWidth; c.height = img.naturalHeight;
  const tc = c.getContext('2d');
  tc.drawImage(img, 0, 0);
  tc.globalCompositeOperation = 'source-atop';
  tc.fillStyle = color;
  tc.fillRect(0, 0, c.width, c.height);
  tintCache = { img, color, canvas: c };
  return c;
}

function renderShape(ctx, shape, cx, cy, size, fillColor, strokeColor, strokeWidth, opacity) {
  if (opacity <= 0) return;
  if (shape === 'custom') {
    if (!customImage) return;
    const src = state.tintEnabled ? getTintedCanvas(customImage, fillColor) : customImage;
    const ratio = src.naturalWidth / src.naturalHeight || src.width / src.height;
    const dw = ratio >= 1 ? size : size * ratio;
    const dh = ratio >= 1 ? size / ratio : size;
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.drawImage(src, cx - dw / 2, cy - dh / 2, dw, dh);
    ctx.restore();
    return;
  }
  ctx.save();
  ctx.globalAlpha = 1;
  const fill = hexToRgba(fillColor, opacity);
  const stroke = strokeColor ? hexToRgba(strokeColor, opacity) : null;
  if (shape === 'flower') {
    const petals = 6;
    const petalR = size * 0.25;
    const dist = size * 0.26;
    const posList = [];
    for (let i = 0; i < petals; i++) {
      const angle = (i / petals) * Math.PI * 2;
      posList.push({ px: cx + dist * Math.cos(angle), py: cy + dist * Math.sin(angle) });
    }
    ctx.fillStyle = fill;
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeWidth; }
    for (const { px, py } of posList) {
      ctx.beginPath();
      ctx.arc(px, py, petalR, 0, Math.PI * 2);
      ctx.fill();
      if (stroke) ctx.stroke();
    }
    ctx.beginPath();
    ctx.arc(cx, cy, petalR * 0.7, 0, Math.PI * 2);
    ctx.fill();
    if (stroke) ctx.stroke();
  } else {
    buildPath(ctx, shape, cx, cy, size);
    ctx.fillStyle = fill;
    ctx.fill();
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = strokeWidth; ctx.stroke(); }
  }
  ctx.restore();
}

// ── フレーム描画 ─────────────────────────────────────────────
function drawFrame(ctx, canvasSize, globalT) {
  const s = state;
  const shapeRadius = canvasSize * (s.shapeSize / 100) * 0.5;
  const shapeSize   = shapeRadius * 2;
  const positions   = getPositions(s.count, s.layout, canvasSize, shapeRadius);
  const stroke = s.outlineEnabled ? s.outlineColor : null;
  for (const pos of positions) {
    const opacity = getOpacity(globalT, pos.phase, s.pattern, s.minOpacity);
    renderShape(ctx, s.shape, pos.x, pos.y, shapeSize, s.color, stroke, s.outlineWidth, opacity);
  }
}

// ── プレビューアニメーション ──────────────────────────────────
const previewCanvas = document.getElementById('previewCanvas');
const previewCtx    = previewCanvas.getContext('2d');

function syncPreviewSize() {
  previewCanvas.width  = state.outputSize;
  previewCanvas.height = state.outputSize;
}

function animLoop(ts) {
  if (animStartTime === null) animStartTime = ts;
  const elapsed = ts - animStartTime;
  const globalT = (elapsed % state.interval) / state.interval;
  const bg = document.getElementById('previewBg').value;
  previewCtx.clearRect(0, 0, state.outputSize, state.outputSize);
  previewCtx.fillStyle = bg;
  previewCtx.fillRect(0, 0, state.outputSize, state.outputSize);
  drawFrame(previewCtx, state.outputSize, globalT);
  animRaf = requestAnimationFrame(animLoop);
}

function restartAnim() {
  if (animRaf) cancelAnimationFrame(animRaf);
  animStartTime = null;
  animRaf = requestAnimationFrame(animLoop);
}

// ── APNG生成 ───────────────────────────────────────────────
const crc32Table = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    t[i] = c;
  }
  return t;
})();

function crc32(buf, offset, length) {
  let crc = 0xFFFFFFFF;
  for (let i = offset; i < offset + length; i++) {
    crc = crc32Table[(crc ^ buf[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function patchApngLoop(apngBuf, numPlays) {
  const buf  = new Uint8Array(apngBuf);
  const view = new DataView(buf.buffer);
  let i = 8;
  while (i < buf.length) {
    const length = view.getUint32(i);
    const type   = String.fromCharCode(buf[i+4], buf[i+5], buf[i+6], buf[i+7]);
    if (type === 'acTL') {
      view.setUint32(i + 8 + 4, numPlays);
      const newCrc = crc32(buf, i + 4, 4 + length);
      view.setUint32(i + 8 + length, newCrc);
      break;
    }
    i += 4 + 4 + length + 4;
  }
  return buf.buffer;
}

function downloadApng(buf, filename) {
  const blob = new Blob([buf], { type: 'image/png' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

document.getElementById('generateBtn').addEventListener('click', () => {
  const btn    = document.getElementById('generateBtn');
  const status = document.getElementById('status');
  if (typeof UPNG === 'undefined') {
    status.textContent = '⚠ UPNG.js load failed';
    return;
  }
  btn.disabled = true;
  status.textContent = 'generating...';
  setTimeout(() => {
    try {
      const s = state;
      const size = s.outputSize;
      const fc = s.frameCount;
      const msPerFrame = Math.round(s.interval / fc);
      const offCanvas = document.createElement('canvas');
      offCanvas.width = size; offCanvas.height = size;
      const offCtx = offCanvas.getContext('2d');
      const rawFrames = [], delays = [];
      for (let f = 0; f < fc; f++) {
        offCtx.clearRect(0, 0, size, size);
        drawFrame(offCtx, size, f / fc);
        const id = offCtx.getImageData(0, 0, size, size);
        rawFrames.push(id.data.buffer.slice(id.data.byteOffset, id.data.byteOffset + id.data.byteLength));
        delays.push(msPerFrame);
      }
      const numPlays = s.loop ? 0 : 1;
      const apngBuf  = patchApngLoop(UPNG.encode(rawFrames, size, size, 0, delays), numPlays);
      const kb = (apngBuf.byteLength / 1024).toFixed(1);
      status.textContent = `✓ ${fc}f · ${kb}KB · ${s.loop ? 'loop' : '1x'}`;
      downloadApng(apngBuf, `chika-chika_${s.shape}_${size}px.png`);
    } catch(e) {
      status.textContent = `⚠ ${e.message}`;
    }
    btn.disabled = false;
  }, 30);
});

// ── コントロール バインド ─────────────────────────────────────
function bindGroup(groupId, stateKey) {
  document.getElementById(groupId).addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll(`#${groupId} button`).forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state[stateKey] = btn.dataset[stateKey];
    restartAnim();
  });
}

function bindSlider(id, stateKey, suffix) {
  const el  = document.getElementById(id);
  const val = document.getElementById(id + 'Val');
  el.addEventListener('input', () => {
    state[stateKey] = parseInt(el.value);
    if (val) val.textContent = el.value + suffix;
    restartAnim();
  });
}

document.getElementById('shapeGroup').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  if (btn.dataset.shape === 'custom' && !customImage) {
    document.getElementById('customFileInput').click();
    return;
  }
  document.querySelectorAll('#shapeGroup button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  state.shape = btn.dataset.shape;
  document.getElementById('tintRow').classList.toggle('hidden', state.shape !== 'custom');
  restartAnim();
});

document.getElementById('customFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    document.getElementById('status').textContent = '⚠ 5MB以内にしてください';
    e.target.value = '';
    return;
  }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    customImage = img;
    tintCache = null;
    document.getElementById('customThumb').src = url;
    document.getElementById('customFileName').textContent = file.name;
    document.getElementById('customThumbRow').classList.remove('hidden');
    document.querySelectorAll('#shapeGroup button').forEach(b => b.classList.remove('active'));
    document.getElementById('customBtn').classList.add('active');
    state.shape = 'custom';
    document.getElementById('tintRow').classList.remove('hidden');
    restartAnim();
  };
  img.onerror = () => {
    document.getElementById('status').textContent = '⚠ 画像読み込み失敗';
    URL.revokeObjectURL(url);
  };
  img.src = url;
  e.target.value = '';
});

bindGroup('patternGroup', 'pattern');
bindGroup('layoutGroup',  'layout');
bindSlider('interval',    'interval',    'ms');
bindSlider('frameCount',  'frameCount',  'f');
bindSlider('minOpacity',  'minOpacity',  '%');
bindSlider('count',       'count',       '個');
bindSlider('shapeSize',   'shapeSize',   '%');
bindSlider('outlineWidth','outlineWidth','px');

document.getElementById('mainColor').addEventListener('input', e => {
  state.color = e.target.value; tintCache = null;
});
document.getElementById('tintEnabled').addEventListener('change', e => {
  state.tintEnabled = e.target.checked; tintCache = null;
});
document.getElementById('outlineColor').addEventListener('input', e => {
  state.outlineColor = e.target.value;
});
document.getElementById('outlineEnabled').addEventListener('change', e => {
  state.outlineEnabled = e.target.checked;
  document.getElementById('outlineExtra').classList.toggle('hidden', !e.target.checked);
});
document.getElementById('outputSize').addEventListener('change', e => {
  state.outputSize = parseInt(e.target.value);
  syncPreviewSize();
  restartAnim();
});
document.getElementById('loopEnabled').addEventListener('change', e => {
  state.loop = e.target.checked;
});
document.getElementById('count').addEventListener('change', () => {
  randomSeeds = generateSeeds(9);
});

syncPreviewSize();
restartAnim();
</script>
</body>
