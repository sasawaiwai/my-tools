<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tranjé FREE — APNGトランジション素材 デモ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0c;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f97316;
    --accent-dim: rgba(249,115,22,.15);
    --text: #f0f0f0;
    --text-dim: #666;
    --text-mid: #999;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── ヘッダー ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 6px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-size: 13px; font-weight: 700;
    color: #fff; letter-spacing: -1px;
  }
  .brand-text .name { font-size: 18px; font-weight: 700; color: var(--accent); font-family: var(--mono); letter-spacing: .06em; }
  .brand-text .sub  { font-size: 10px; color: var(--text-dim); font-family: var(--mono); margin-top: 1px; }
  .free-badge {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    letter-spacing: .06em;
  }

  /* ── コントロール ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .seg {
    display: flex;
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px;
    gap: 2px;
  }
  .seg-btn {
    padding: 4px 12px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .seg-btn:hover { color: var(--text); }
  .seg-btn.active { background: var(--accent); color: #fff; font-weight: 700; }

  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }

  /* ── ステージ ── */
  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 48px 16px;
    gap: 20px;
    min-height: 0;
  }

  /* カードペア */
  .card-pair {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    width: 100%;
    max-width: 1100px;
  }

  .card {
    flex: 1;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--accent); }

  .card-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: url('picography-hipster-man.jpg') center center / cover no-repeat;
  }

  .card-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-footer {
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--border);
    background: var(--surface2);
    flex-shrink: 0;
  }
  .variant-badge {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: .1em;
    padding: 3px 9px;
    border-radius: 4px;
  }
  .variant-badge.in  { background: var(--accent-dim); color: var(--accent); }
  .variant-badge.out { background: rgba(99,102,241,.15); color: #818cf8; }
  .variant-desc { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }

  /* ── 情報バー ── */
  .info-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 1100px;
    flex-shrink: 0;
  }
  .shape-name {
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--mono);
    letter-spacing: .04em;
    text-transform: uppercase;
    line-height: 1;
  }
  .shape-meta {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
    margin-top: 4px;
  }

  /* ドットインジケーター */
  .dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all .2s;
  }
  .dot.active { background: var(--accent); transform: scale(1.4); }
  .dot:hover:not(.active) { background: var(--text-dim); }

  /* ── フッター ── */
  footer {
    padding: 10px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .nav-btns { display: flex; gap: 8px; }
  .nav-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-mid);
    font-size: 14px;
    cursor: pointer;
    display: grid; place-items: center;
    transition: all .15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  .footer-info { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
  .auto-badge {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  .auto-badge.playing { border-color: var(--accent); color: var(--accent); }

  .fullscreen-btn {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 10px; border-radius: 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all .15s;
  }
  .fullscreen-btn:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">▶◼</div>
    <div class="brand-text">
      <div class="name">Tranjé</div>
      <div class="sub">APNGトランジション素材</div>
    </div>
    <span class="free-badge">FREE</span>
  </div>
  <div class="controls">
    <div class="seg" id="dirSeg"></div>
    <div class="divider"></div>
    <div class="seg" id="colorSeg"></div>
  </div>
</header>

<div class="stage">
  <div class="card-pair">
    <div class="card" id="cardIn">
      <div class="card-img-wrap" id="wrapIn">
        <img class="card-img" id="imgIn" alt="IN">
      </div>
      <div class="card-footer">
        <span class="variant-badge in">IN — 登場</span>
        <span class="variant-desc">画面が切り替わる</span>
      </div>
    </div>
    <div class="card" id="cardOut">
      <div class="card-img-wrap" id="wrapOut">
        <img class="card-img" id="imgOut" alt="OUT">
      </div>
      <div class="card-footer">
        <span class="variant-badge out">OUT — 退場</span>
        <span class="variant-desc">画面を閉じる</span>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <div>
      <div class="shape-name" id="shapeName">CIRCLE</div>
      <div class="shape-meta" id="shapeMeta"></div>
    </div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<footer>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn" title="前へ">‹</button>
    <button class="nav-btn" id="nextBtn" title="次へ">›</button>
  </div>
  <div class="footer-info" id="footerInfo"></div>
  <button class="auto-badge playing" id="autoBtn">⏵ AUTO</button>
  <button class="fullscreen-btn" id="fsBtn">⛶ 全画面</button>
</footer>

<script>
const directions = [
  { ja: '左→右', en: 'Left to Right', key: 'left_to_right',  folder: '左から右_1920×1080' },
  { ja: '右→左', en: 'Right to Left', key: 'right_to_left',  folder: '右から左_1920×1080' },
  { ja: '上→下', en: 'Top to Bottom', key: 'top_to_bottom',  folder: '上から下_1920×1080' },
  { ja: '下→上', en: 'Bottom to Top', key: 'bottom_to_top',  folder: '下から上_1920×1080' },
  { ja: '中央→外', en: 'Center Out',  key: 'center_out',     folder: '中央から外_1920×1080' },
  { ja: '外→中央', en: 'Outside In',  key: 'outside_in',     folder: '外から中央_1920×1080' },
];
const shapes = ['circle','cross','heart','hex','rect','ring','square','star','triangle'];
const colors = [
  { ja: '白', folder: 'トランジョン白と透明' },
  { ja: '黒', folder: 'トランジョン黒と透明' },
];
const DURATION = '2'; // 無料版は2秒固定

let curDir = 0, curColor = 0, curShape = 0;
let autoPlay = true;
let timer = null;

function path(variant) {
  const d = directions[curDir], c = colors[curColor];
  return `${c.folder}/${d.folder}/${DURATION}秒/${shapes[curShape]}_${d.key}_${variant}_${DURATION}s_1920x1080.png`;
}

function render() {
  document.getElementById('imgIn').src  = path('in');
  document.getElementById('imgOut').src = path('out');

  document.getElementById('shapeName').textContent = shapes[curShape].toUpperCase();
  const d = directions[curDir];
  document.getElementById('shapeMeta').textContent =
    `${d.ja}（${d.en}）  /  ${DURATION}秒  /  1920×1080`;
  document.getElementById('footerInfo').textContent =
    `${curShape + 1} / ${shapes.length}  —  ${shapes[curShape]}`;

  document.querySelectorAll('.dot').forEach((el, i) => el.classList.toggle('active', i === curShape));
  document.querySelectorAll('#dirSeg .seg-btn').forEach((el,i)   => el.classList.toggle('active', i === curDir));
  document.querySelectorAll('#colorSeg .seg-btn').forEach((el,i) => el.classList.toggle('active', i === curColor));
}

function startAuto() {
  stopAuto();
  if (!autoPlay) return;
  timer = setTimeout(() => {
    curShape = (curShape + 1) % shapes.length;
    render();
    startAuto();
  }, parseInt(DURATION) * 1000 + 600);
}

function stopAuto() { clearTimeout(timer); }

function buildSeg(id, items, setIdx) {
  const seg = document.getElementById(id);
  items.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'seg-btn';
    btn.textContent = item.ja;
    btn.onclick = () => { setIdx(i); render(); startAuto(); };
    seg.appendChild(btn);
  });
}

buildSeg('dirSeg',   directions, i => { curDir = i; curShape = 0; });
buildSeg('colorSeg', colors,     i => { curColor = i; });

const dotsEl = document.getElementById('dots');
shapes.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.onclick = () => { curShape = i; render(); startAuto(); };
  dotsEl.appendChild(d);
});

document.getElementById('prevBtn').onclick = () => { curShape = (curShape - 1 + shapes.length) % shapes.length; render(); startAuto(); };
document.getElementById('nextBtn').onclick = () => { curShape = (curShape + 1) % shapes.length; render(); startAuto(); };

document.getElementById('autoBtn').onclick = () => {
  autoPlay = !autoPlay;
  document.getElementById('autoBtn').textContent = autoPlay ? '⏵ AUTO' : '⏸ PAUSE';
  document.getElementById('autoBtn').classList.toggle('playing', autoPlay);
  autoPlay ? startAuto() : stopAuto();
};

document.getElementById('fsBtn').onclick = () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
    document.getElementById('fsBtn').textContent = '✕ 全画面解除';
  } else {
    document.exitFullscreen();
    document.getElementById('fsBtn').textContent = '⛶ 全画面';
  }
};
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('fsBtn').textContent = '⛶ 全画面';
});

render();
startAuto();
</script>
</body>
</html>
